services:
  radio:
    image: ${MUSICRADIO_IMAGE:-ghcr.io/asong2001/localhost-music-radio:latest}
    container_name: music-radio
    restart: unless-stopped
    ports:
      - "${RADIO_PORT:-8000}:${RADIO_PORT:-8000}"
      - "${RADIO_WEB_PORT:-8001}:${RADIO_WEB_PORT:-8001}"
    volumes:
      - ${RADIO_AUDIO_HOST_DIR:-./audio}:/radio/audio:ro
      - ${RADIO_PUBLIC_HOST_DIR:-./public}:/radio/public
      - ${RADIO_CONFIG_HOST_DIR:-./config}:/radio/config
    environment:
      RADIO_MODE: ${RADIO_MODE:-loop}
      RADIO_PORT: ${RADIO_PORT:-8000}
      RADIO_WEB_PORT: ${RADIO_WEB_PORT:-8001}
      RADIO_AUDIO_BITRATE: ${RADIO_AUDIO_BITRATE:-256k}
      RADIO_MP3_BITRATE: ${RADIO_MP3_BITRATE:-192k}
      RADIO_HLS_TIME: ${RADIO_HLS_TIME:-3}
      RADIO_HLS_LIST_SIZE: ${RADIO_HLS_LIST_SIZE:-5}
